<!DOCTYPE html>
<html lang="th"><head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Meedee Jewelry · รายละเอียดสินค้า</title>
  <meta name="description" content="รายละเอียดงานผ่าหวาย Meedee Jewelry">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Prompt:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root{
      --mahogany:#220A05;--wine:#550F05;--brick:#761305;--gold:#C8A45C;
      --oldlace:#F7F1E1;--bone:#E5D8C1;--mute:#9c8574;
    }
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    html,body{height:100%;overflow:hidden;}
    body{background:var(--mahogany);color:var(--oldlace);
      font-family:'Prompt',system-ui,sans-serif;font-weight:300;-webkit-font-smoothing:antialiased;}
    .viewer{position:fixed;inset:0;overflow:hidden;}
    /* stacked image layers for crossfade */
    .stage{position:absolute;inset:0;cursor:pointer;}
    .stage img{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;
      opacity:0;transition:opacity .55s ease;will-change:opacity;}
    .stage img.on{opacity:1;}
    /* top bar */
    .top{position:absolute;top:0;left:0;right:0;z-index:5;display:flex;align-items:center;
      justify-content:space-between;padding:calc(env(safe-area-inset-top) + 12px) 14px 26px;
      background:linear-gradient(180deg, rgba(34,10,5,0.82), rgba(34,10,5,0));pointer-events:none;}
    .top .l{display:flex;align-items:center;gap:11px;}
    .back{pointer-events:auto;flex:none;display:inline-flex;align-items:center;justify-content:center;
      width:40px;height:40px;border-radius:50%;background:rgba(34,10,5,0.55);
      border:1px solid rgba(200,164,92,0.5);color:var(--gold);text-decoration:none;font-size:21px;
      -webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px);}
    .ttl{display:flex;flex-direction:column;line-height:1.15;}
    .ttl .en{font-family:'Cormorant Garamond',serif;font-weight:600;letter-spacing:.15em;
      text-transform:uppercase;font-size:10.5px;color:var(--gold);}
    .ttl .th{font-size:16px;color:var(--oldlace);text-shadow:0 1px 4px rgba(0,0,0,0.6);}
    .counter{font-size:12px;color:var(--bone);background:rgba(34,10,5,0.5);padding:4px 10px;
      border-radius:14px;border:1px solid rgba(200,164,92,0.35);}
    /* tap-to-change ripple hint (brief, on load) */
    .tapcue{position:absolute;left:50%;top:50%;z-index:4;transform:translate(-50%,-50%);
      display:flex;flex-direction:column;align-items:center;gap:10px;pointer-events:none;
      padding:20px 26px;border-radius:18px;background:rgba(18,5,2,0.7);
      border:1px solid rgba(200,164,92,0.45);box-shadow:0 8px 24px rgba(0,0,0,0.6);
      -webkit-backdrop-filter:blur(4px);backdrop-filter:blur(4px);
      opacity:0;transition:opacity .4s;}
    .tapcue.show{opacity:1;}
    .tapcue svg{width:44px;height:44px;filter:drop-shadow(0 2px 6px rgba(0,0,0,0.8));animation:tp 1.2s ease-in-out infinite;}
    .tapcue span{font-size:12.5px;color:var(--oldlace);}
    @keyframes tp{0%,100%{transform:translateY(0) scale(1);}45%{transform:translateY(5px) scale(.9);}}
    /* spec overlay at bottom */
    .info{position:absolute;left:0;right:0;bottom:0;z-index:5;padding:40px 18px calc(env(safe-area-inset-bottom) + 18px);
      background:linear-gradient(0deg, rgba(20,6,3,0.94) 0%, rgba(20,6,3,0.72) 55%, rgba(20,6,3,0));pointer-events:none;}
    .specrow{display:flex;justify-content:center;flex-wrap:wrap;gap:10px 22px;margin-bottom:10px;}
    .chip{display:flex;flex-direction:column;align-items:center;min-width:78px;}
    .chip .k{font-size:11px;letter-spacing:.05em;color:var(--gold);}
    .chip .v{font-size:16px;color:var(--oldlace);margin-top:2px;}
    .chip .v.empty{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:15px;color:var(--mute);}
    .colornote{text-align:center;font-size:12.5px;color:var(--bone);opacity:.9;}
    .colornote a{color:var(--gold);font-weight:500;text-decoration:underline;text-underline-offset:2px;pointer-events:auto;}
    .dots{display:flex;justify-content:center;gap:7px;margin-top:12px;}
    .dot{width:7px;height:7px;border-radius:50%;background:rgba(200,164,92,0.3);transition:background .25s,transform .25s;}
    .dot.on{background:var(--gold);transform:scale(1.3);}
    .err{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;color:var(--mute);}
    .err a{color:var(--gold);}
    /* language switch (in top bar) */
    .top .r{display:flex;align-items:center;gap:8px;pointer-events:auto;}
    .langsw{display:flex;align-items:center;background:rgba(34,10,5,0.55);border:1px solid rgba(200,164,92,0.5);
      border-radius:14px;overflow:hidden;-webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px);}
    .langsw button{appearance:none;-webkit-appearance:none;border:0;background:transparent;color:var(--bone);
      padding:4px 9px;cursor:pointer;font-family:inherit;font-size:11.5px;letter-spacing:.04em;}
    .langsw button.on{background:var(--gold);color:#2a0f06;font-weight:500;}
    /* social icons */
    .social{display:flex;justify-content:center;gap:15px;margin-top:12px;}
    .social a{display:inline-flex;align-items:center;justify-content:center;width:42px;height:42px;
      border-radius:50%;border:1px solid rgba(200,164,92,0.5);color:var(--gold);pointer-events:auto;
      transition:background .2s,transform .12s;}
    .social a:active{transform:scale(0.94);}
    .social svg{width:21px;height:21px;display:block;}
  </style>
</head>
<body>
  <div class="viewer" id="viewer"></div>
  <script src="data.js"></script>
  <script>
    const viewer=document.getElementById('viewer');
    let LANG, _s=null; try{_s=localStorage.getItem('meedee_lang');}catch(e){}
    LANG = _s || ((navigator.language||navigator.userLanguage||'').toLowerCase().indexOf('th')===0?'th':'en');
    const T=k=>I18N[LANG][k];
    const q=new URLSearchParams(location.search).get('p')||'';
    const m=q.match(/^([a-z]+)-(\d+)$/);
    function fail(){viewer.innerHTML='<div class="err"><span>'+T('notFound')+'</span><a href="index.html">‹ '+T('back')+'</a></div>';}
    if(!m){ fail(); } else {
      const cat=m[1], n=m[2];
      const item=ITEMS[cat]&&ITEMS[cat][n];
      const label=LABELS[cat]||cat;
      const catObj=(typeof CATS!=='undefined')?CATS.find(c=>c.key===cat):null;
      if(!item){ fail(); } else {
        const photos=item.photos, total=photos.length;
        // stage
        const stage=document.createElement('div'); stage.className='stage'; stage.id='stage';
        photos.forEach((src,i)=>{const im=document.createElement('img');im.src=src;
          im.alt=(catObj?catObj.en:'Meedee')+' '+n+' ('+(i+1)+')';if(i===0)im.classList.add('on');stage.appendChild(im);});
        viewer.appendChild(stage);
        // top bar
        const top=document.createElement('div'); top.className='top';
        top.innerHTML='<div class="l"><a class="back" href="index.html#'+cat+'" aria-label="'+T('back')+'">‹</a>'+
          '<div class="ttl"><span class="en">'+(catObj?catObj.en:'Meedee')+'</span>'+
          '<span class="th" id="dnum" data-n="'+n+'"></span></div></div>'+
          '<div class="r"><div class="langsw" id="langsw"><button type="button" data-lang="en">EN</button><button type="button" data-lang="th">TH</button></div>'+
          (total>1?'<span class="counter" id="counter">1 / '+total+'</span>':'')+'</div>';
        viewer.appendChild(top);
        // bottom info
        const info=document.createElement('div'); info.className='info';
        const val=v=>v?('<span class="v">'+v+'</span>'):'<span class="v empty" data-i18n="emptyVal"></span>';
        let chips='<div class="chip"><span class="k" data-i18n="specGold"></span>'+val(item.gold)+'</div>'+
                  '<div class="chip"><span class="k" data-i18n="specStone"></span>'+val(item.stone)+'</div>';
        if(cat==='bracelet') chips+='<div class="chip"><span class="k" data-i18n="specLength"></span><span class="v" id="lenval" data-raw="'+item.length+'"></span></div>';
        let dots=''; if(total>1){dots='<div class="dots" id="dots">'+photos.map((_,i)=>'<span class="dot'+(i?'':' on')+'"></span>').join('')+'</div>';}
        info.innerHTML='<div class="specrow">'+chips+'</div>'+
          '<div class="colornote"><span data-i18n="footerLine"></span></div>'+
          '<div class="social">'+
            '<a href="https://lin.ee/wcgxSgl" target="_blank" rel="noopener" aria-label="LINE"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20 10.2c0-3.7-3.6-6.7-8-6.7s-8 3-8 6.7c0 3.3 2.9 6.1 6.8 6.6.9.2.8.5.6 1.6-.1.4-.4 1.5.9.9 1.4-.6 5-3.4 6.5-5.9.8-1.2 1.2-2.3 1.2-3.2Z"/><path d="M8 9.4v2.7M8 12.1h1.5M11 9.4v2.7M16 9.4h-1.5v2.7H16M14.5 10.7h1.1M12.9 9.4l1.1 2.7" stroke-width="1"/></svg></a>'+
            '<a href="https://www.instagram.com/meedee_jewelry?igsh=eDd2OXl6NThhY2hw&utm_source=qr" target="_blank" rel="noopener" aria-label="Instagram"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3.5" y="3.5" width="17" height="17" rx="5"/><circle cx="12" cy="12" r="3.8"/><circle cx="17.2" cy="6.8" r="1.1" fill="currentColor" stroke="none"/></svg></a>'+
          '</div>'+dots;
        viewer.appendChild(info);
        // tap cue — show only the very first time the customer ever opens a detail page
        if(total>1 && !localStorage.getItem('meedee_pd_tapcue')){
          const cue=document.createElement('div'); cue.className='tapcue';
          cue.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="#C8A45C" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11V6.5a1.5 1.5 0 0 1 3 0V11" fill="rgba(34,10,5,0.35)"/><path d="M12 11V9a1.5 1.5 0 0 1 3 0v2"/><path d="M15 11v-.5a1.5 1.5 0 0 1 3 0V15a5 5 0 0 1-5 5h-1.6a5 5 0 0 1-3.7-1.6L5 15.5a1.6 1.6 0 0 1 2.3-2.2L9 15"/></svg><span data-i18n="tapChange"></span>';
          viewer.appendChild(cue);
          requestAnimationFrame(()=>cue.classList.add('show'));
          setTimeout(()=>{cue.classList.remove('show');setTimeout(()=>cue.remove(),400);},2600);
          try{ localStorage.setItem('meedee_pd_tapcue','1'); }catch(e){}
        }
        // tap to change (crossfade)
        let cur=0;
        const imgs=stage.querySelectorAll('img');
        const counter=document.getElementById('counter');
        const dotEls=document.getElementById('dots')?document.getElementById('dots').children:null;
        function go(next){
          imgs[cur].classList.remove('on');
          cur=(next+total)%total;
          imgs[cur].classList.add('on');
          if(counter) counter.textContent=(cur+1)+' / '+total;
          if(dotEls) for(let k=0;k<dotEls.length;k++) dotEls[k].classList.toggle('on',k===cur);
        }
        if(total>1) stage.addEventListener('click', ()=>go(cur+1));
        // language apply + toggle
        function applyLang(l){
          LANG=(l==='th')?'th':'en'; document.documentElement.lang=LANG;
          document.querySelectorAll('[data-i18n]').forEach(el=>{const v=I18N[LANG][el.getAttribute('data-i18n')]; if(v!=null) el.innerHTML=v;});
          const dn=document.getElementById('dnum'); if(dn) dn.textContent=(LANG==='th'?(LABELS[cat]+' · '):'')+I18N[LANG].numPrefix+dn.dataset.n;
          const lv=document.getElementById('lenval'); if(lv) lv.textContent=lv.dataset.raw+I18N[LANG].lengthUnit;
          const bk=document.querySelector('.back'); if(bk) bk.setAttribute('aria-label',I18N[LANG].back);
          document.querySelectorAll('#langsw button').forEach(b=>b.classList.toggle('on',b.getAttribute('data-lang')===LANG));
          try{localStorage.setItem('meedee_lang',LANG);}catch(e){}
        }
        document.querySelectorAll('#langsw button').forEach(b=>
          b.addEventListener('click', e=>{ e.stopPropagation(); applyLang(b.getAttribute('data-lang')); }));
        applyLang(LANG);
      }
    }
  </script>
</body></html>
