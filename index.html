<!DOCTYPE html>
<html lang="th"><head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meedee Jewelry · ตัวอย่างสินค้า</title>
  <meta name="description" content="Meedee Jewelry — ตัวอย่างสินค้างานผ่าหวาย เลือกดูแต่ละชิ้นได้ ถักลวดทองรอบพลอยด้วยมือ">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Prompt:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root{
      --mahogany:#220A05;--wine:#550F05;--brick:#761305;--terra:#903306;
      --burnt:#C45306;--gold:#C8A45C;--oldlace:#F7F1E1;--bone:#E5D8C1;--mute:#6F5C50;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    html{scroll-behavior:smooth;}
    body{
      background:var(--mahogany);color:var(--oldlace);
      font-family:'Prompt',system-ui,sans-serif;font-weight:300;
      -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;min-height:100dvh;
      background-image:
        radial-gradient(120% 45% at 50% -5%, rgba(196,83,6,0.15), rgba(196,83,6,0) 55%),
        radial-gradient(90% 35% at 50% 3%, rgba(200,164,92,0.06), rgba(200,164,92,0) 60%);
      background-repeat:no-repeat;background-attachment:fixed;
    }
    .wrap{max-width:560px;margin:0 auto;padding:34px 16px 48px;}
    /* header */
    header{text-align:center;margin-bottom:20px;}
    .brand{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:clamp(26px,7vw,34px);color:var(--oldlace);}
    .brand span{display:inline-block;letter-spacing:.2em;margin-right:-.2em;}
    /* NOTE: no letter-spacing on Thai — it detaches tone marks from consonants */
    .kicker{margin-top:8px;font-size:15px;letter-spacing:normal;color:var(--gold);}
    .kicker span{display:inline-block;}
    .lead{margin-top:16px;font-size:14px;line-height:1.7;color:var(--bone);}
    .hint{margin-top:6px;font-size:12.5px;color:var(--mute);}
    /* category section */
    .cat{margin-top:34px;}
    .cat-head{display:flex;align-items:baseline;gap:10px;margin-bottom:12px;padding-bottom:10px;
      border-bottom:1px solid rgba(118,19,5,0.5);}
    .cat-en{font-family:'Cormorant Garamond',serif;font-weight:600;letter-spacing:.16em;
      text-transform:uppercase;font-size:12px;color:var(--gold);}
    .cat-th{font-size:16px;font-weight:400;color:var(--oldlace);}
    /* interactive group image */
    .board{position:relative;width:100%;border-radius:10px;overflow:hidden;
      box-shadow:0 8px 26px rgba(0,0,0,0.4);}
    .board img{width:100%;height:auto;display:block;}
    /* invisible tap zones — the gold outline lives baked into the group image itself */
    .spot{position:absolute;display:block;background:transparent;border:0;border-radius:10px;
      -webkit-tap-highlight-color:transparent;cursor:pointer;
      transition:transform .12s ease;}
    .spot:active{transform:scale(0.97);}
    .spot:focus-visible{outline:2px solid rgba(200,164,92,0.7);outline-offset:2px;}
    .tapnote{margin-top:9px;font-size:12px;color:var(--mute);text-align:center;letter-spacing:.02em;}
    /* info badge (top-right of each group image): shows a pill on scroll-in, then collapses to "i" */
    .info{position:absolute;top:10px;right:10px;z-index:20;}
    .info .btn{display:inline-flex;align-items:center;height:32px;padding:0 5px;cursor:pointer;
      background:rgba(34,10,5,0.86);border:1px solid rgba(200,164,92,0.55);border-radius:17px;
      color:var(--oldlace);font-size:12.5px;box-shadow:0 3px 10px rgba(0,0,0,0.5);
      -webkit-backdrop-filter:blur(5px);backdrop-filter:blur(5px);}
    .info .lab{max-width:0;overflow:hidden;white-space:nowrap;opacity:0;
      transition:max-width .45s ease, opacity .3s ease, margin .45s ease;}
    .info.expanded .lab{max-width:150px;opacity:1;margin:0 6px 0 4px;}
    .info .dot{flex:none;width:22px;height:22px;border-radius:50%;border:1px solid var(--gold);color:var(--gold);
      display:inline-flex;align-items:center;justify-content:center;
      font-family:'Cormorant Garamond',serif;font-style:italic;font-size:15px;line-height:1;}
    .info .pop{position:absolute;top:38px;right:0;width:196px;padding:11px 13px;
      background:rgba(34,10,5,0.94);border:1px solid rgba(200,164,92,0.5);border-radius:11px;
      font-size:12.5px;line-height:1.65;color:var(--bone);box-shadow:0 8px 18px rgba(0,0,0,0.55);
      opacity:0;transform:translateY(-5px);pointer-events:none;transition:opacity .25s, transform .25s;}
    .info.popopen .pop{opacity:1;transform:translateY(0);pointer-events:auto;}
    /* coming soon */
    .soon{border:1px dashed rgba(118,19,5,0.8);border-radius:10px;padding:30px 16px;text-align:center;
      background:rgba(85,15,5,0.25);}
    .soon .s1{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:19px;color:var(--gold);}
    .soon .s2{margin-top:6px;font-size:13px;color:var(--mute);}
    footer{margin-top:40px;text-align:center;font-size:13px;color:var(--mute);line-height:1.7;}
    footer a{color:var(--gold);font-weight:500;text-decoration:underline;text-underline-offset:3px;
      text-decoration-color:rgba(200,164,92,0.6);}
    /* language switch */
    .langsw{position:fixed;top:12px;right:12px;z-index:50;display:flex;align-items:center;
      background:rgba(34,10,5,0.8);border:1px solid rgba(200,164,92,0.5);border-radius:15px;overflow:hidden;
      -webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px);box-shadow:0 3px 10px rgba(0,0,0,0.4);}
    .langsw button{appearance:none;-webkit-appearance:none;border:0;background:transparent;color:var(--mute);
      padding:5px 11px;cursor:pointer;font-family:inherit;font-size:12px;letter-spacing:.04em;}
    .langsw button.on{background:var(--gold);color:#2a0f06;font-weight:500;}
    /* English mode: drop the Thai category name, promote the English one */
    :root[lang="en"] .cat-th{display:none;}
    :root[lang="en"] .cat-en{font-size:18px;}
    :root[lang="en"] .lead{font-size:13px;line-height:1.55;}
    /* social icons */
    .social{display:flex;justify-content:center;gap:15px;margin-top:15px;}
    .social a{display:inline-flex;align-items:center;justify-content:center;width:44px;height:44px;
      border-radius:50%;border:1px solid rgba(200,164,92,0.5);color:var(--gold);
      transition:background .2s,border-color .2s,transform .12s;}
    .social a:hover{background:rgba(200,164,92,0.12);border-color:var(--gold);}
    .social a:active{transform:scale(0.94);}
    .social svg{width:22px;height:22px;display:block;}
  </style>
</head>
<body>
  <div class="langsw" id="langsw"><button type="button" data-lang="en">EN</button><button type="button" data-lang="th">TH</button></div>
  <main class="wrap">
    <header>
      <h1 class="brand"><span>MEEDEE&nbsp;JEWELRY</span></h1>
      <p class="kicker"><span data-i18n="kicker">ตัวอย่างสินค้า</span></p>
      <p class="lead" data-i18n="lead">งานผ่าหวายทุกชิ้นถักด้วยมือ ถักลวดทองรอบพลอยทีละเม็ด<br>เลือกดูแต่ละแบบได้จากด้านล่าง</p>
      <p class="hint" data-i18n="hint">แตะที่ชิ้นงานเพื่อดูรูปและรายละเอียด</p>
    </header>
    <div id="cats"></div>
    <footer>
      <span data-i18n="footerLine">สนใจรับชมผลงานทั้งหมด</span>
      <div class="social">
        <a href="https://lin.ee/wcgxSgl" target="_blank" rel="noopener" aria-label="LINE"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20 10.2c0-3.7-3.6-6.7-8-6.7s-8 3-8 6.7c0 3.3 2.9 6.1 6.8 6.6.9.2.8.5.6 1.6-.1.4-.4 1.5.9.9 1.4-.6 5-3.4 6.5-5.9.8-1.2 1.2-2.3 1.2-3.2Z"/><path d="M8 9.4v2.7M8 12.1h1.5M11 9.4v2.7M16 9.4h-1.5v2.7H16M14.5 10.7h1.1M12.9 9.4l1.1 2.7" stroke-width="1"/></svg></a>
        <a href="https://www.instagram.com/meedee_jewelry?igsh=eDd2OXl6NThhY2hw&amp;utm_source=qr" target="_blank" rel="noopener" aria-label="Instagram"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3.5" y="3.5" width="17" height="17" rx="5"/><circle cx="12" cy="12" r="3.8"/><circle cx="17.2" cy="6.8" r="1.1" fill="currentColor" stroke="none"/></svg></a>
        <a href="https://wa.me/66982833173" target="_blank" rel="noopener" aria-label="WhatsApp"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"><path d="M3.5 20.5l1.2-4.2A8 8 0 1 1 8 19.4l-4.5 1.1Z"/><path d="M9 8.2c.15-.4.35-.4.6-.4.2 0 .45 0 .6.4l.6 1.4c.08.2 0 .35-.1.5l-.4.5c-.1.12-.15.25-.06.42.26.5 1.15 1.5 2 1.9.2.1.35.08.5-.06l.5-.5c.15-.14.3-.15.45-.08l1.3.7c.25.14.35.25.35.42 0 .25-.25.9-.85 1.2-.5.25-1.2.35-2.6-.25-1.7-.75-2.9-2.45-3.15-2.9-.15-.3-.75-1.2-.75-2.1 0-.85.45-1.3.6-1.5Z" fill="currentColor" stroke="none"/></svg></a>
      </div>
    </footer>
  </main>

  <script src="data.js"></script>
  <script>
    const root = document.getElementById('cats');
    function makeSpots(cat){
      const h = cat.hot, frag = document.createDocumentFragment();
      const put = (n, l, t, w, ht) => {
        const a = document.createElement('a');
        a.className = 'spot';
        a.href = 'detail.html?p=' + cat.key + '-' + n;
        a.style.left = (l*100)+'%'; a.style.top = (t*100)+'%';
        a.style.width = (w*100)+'%'; a.style.height = (ht*100)+'%';
        a.setAttribute('aria-label', (LABELS[cat.key]||'') + ' แบบที่ ' + n);
        frag.appendChild(a);
      };
      if (h.type === 'grid'){
        const cw=(h.R-h.L)/h.cols, ch=(h.B-h.T)/h.rows; let n=1;
        for (let r=0;r<h.rows;r++) for (let c=0;c<h.cols;c++){
          put(n, h.L+c*cw+h.pad, h.T+r*ch+h.pad, cw-2*h.pad, ch-2*h.pad); n++;
        }
      } else if (h.type === 'rows'){
        for (let i=0;i<h.count;i++){
          const cy=h.first+i*h.step;
          put(i+1, h.L, cy-h.hh, h.R-h.L, h.hh*2);
        }
      } else if (h.type === 'boxes'){
        h.pts.forEach((p,i)=>{ put(i+1, p[0]-h.hw, p[1]-h.hh, h.hw*2, h.hh*2); });
      } else if (h.type === 'rects'){
        h.rects.forEach((r,i)=>{ put(i+1, r[0], r[1], r[2], r[3]); });
      }
      return frag;
    }
    function addInfoBadge(board){
      const info=document.createElement('div'); info.className='info';
      info.innerHTML='<div class="btn" role="button" tabindex="0" aria-label="i">'+
        '<span class="dot">i</span><span class="lab" data-i18n="badgeLab"></span></div>'+
        '<div class="pop" data-i18n="badgePop"></div>';
      board.appendChild(info);
      const btn=info.querySelector('.btn');
      btn.addEventListener('click', e=>{ e.preventDefault(); e.stopPropagation();
        info.classList.remove('expanded'); info.classList.toggle('popopen'); });
      document.addEventListener('click', ()=>info.classList.remove('popopen'));
      return info;
    }
    CATS.forEach(cat=>{
      const sec=document.createElement('section'); sec.className='cat'; sec.id=cat.key;
      sec.innerHTML =
        '<div class="cat-head"><span class="cat-en">'+cat.en+'</span><span class="cat-th">'+cat.th+'</span></div>';
      if (cat.status==='live'){
        const board=document.createElement('div'); board.className='board';
        const img=document.createElement('img'); img.src=cat.group; img.alt=cat.th+' — ตัวอย่างสินค้า Meedee'; img.loading='lazy';
        board.appendChild(img); board.appendChild(makeSpots(cat));
        const info=addInfoBadge(board);
        sec.appendChild(board);
        const note=document.createElement('p'); note.className='tapnote'; note.setAttribute('data-i18n','tapnote'); sec.appendChild(note);
        // reveal pill briefly when the image scrolls into view, then collapse to "i"
        let done=false;
        const io=new IntersectionObserver((ents)=>{
          ents.forEach(en=>{ if(en.isIntersecting && !done){ done=true;
            info.classList.add('expanded');
            setTimeout(()=>info.classList.remove('expanded'), 3200);
            io.disconnect();
          }});
        }, {threshold:0.35});
        io.observe(board);
      } else {
        const s=document.createElement('div'); s.className='soon';
        s.innerHTML='<div class="s1">Coming soon</div><div class="s2" data-i18n="soon2"></div>';
        sec.appendChild(s);
      }
      root.appendChild(sec);
    });

    /* ---- language (EN default via browser detect; TH for Thai devices; remembered) ---- */
    let LANG;
    function applyLang(l){
      LANG = (l==='th')?'th':'en';
      document.documentElement.lang = LANG;
      document.querySelectorAll('[data-i18n]').forEach(el=>{
        const v=I18N[LANG][el.getAttribute('data-i18n')]; if(v!=null) el.innerHTML=v;
      });
      document.querySelectorAll('#langsw button').forEach(b=>b.classList.toggle('on', b.getAttribute('data-lang')===LANG));
      try{ localStorage.setItem('meedee_lang', LANG); }catch(e){}
    }
    document.querySelectorAll('#langsw button').forEach(b=>
      b.addEventListener('click', ()=>applyLang(b.getAttribute('data-lang'))));
    let saved=null; try{ saved=localStorage.getItem('meedee_lang'); }catch(e){}
    applyLang(saved || ((navigator.language||navigator.userLanguage||'').toLowerCase().indexOf('th')===0 ? 'th' : 'en'));
  </script>
</body></html>
